---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1-deployment
  namespace: my-namespace
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app1-selector
  template:
    metadata:
      labels:
        app: app1-selector
    spec:
      containers:
        - name: app1-container
          image: nginx:stable
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
