---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation
  namespace: pedelec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation
  template:
    metadata:
      labels:
        app: reservation
    spec:
      containers:
        - name: reservation
          image: ghcr.io/mtze/pedelec-reservation:latest
          ports:
            - containerPort: 8080
              name: reservation-api
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
