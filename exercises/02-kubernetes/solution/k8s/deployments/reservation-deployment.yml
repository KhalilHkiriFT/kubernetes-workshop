apiVersion: apps/v1
kind: Deployment
metadata:
  name: reservation
  namespace: my-namespace
  labels:
    app: reservation
spec:
  replicas: 1
  selector:
    matchLabels:
      app: reservation
  template:
    metadata:
      labels:
        app: reservation
    spec:
      containers:
        - name: reservation
          image: ghcr.io/mtze/pedelec-reservation:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: reservation-api
          resources:
            requests:
              cpu: "50m"
              memory: "32Mi"
            limits:
              cpu: "500m"
              memory: "128Mi"
